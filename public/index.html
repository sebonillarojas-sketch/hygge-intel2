<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HYGGE · INTEL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:#373737 transparent}
:root{
  --dark:#1A1A1A;--charcoal:#373737;--lavanda:#95ABE8;--naranja:#F7643B;
  --crema:#E3E1DE;--light:#888;--mid:#555;--success:#4CAF88;
  --warning:#F7C43B;--danger:#E85555;--purple:#A855F7;
}
body{background:var(--dark);color:var(--crema);font-family:system-ui,sans-serif;font-size:14px;min-height:100vh}
.mono{font-family:'Space Mono',monospace}
@keyframes pulse{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOPBAR */
#topbar{position:sticky;top:0;z-index:200;height:54px;background:var(--dark);
  border-bottom:1px solid var(--charcoal);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;gap:12px}
#logo{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;letter-spacing:2px;white-space:nowrap}
#logo span{color:var(--lavanda)}
#status-badge{font-size:10px;color:var(--light);font-family:'Space Mono',monospace;white-space:nowrap}
.live-dot{color:var(--success);animation:pulse 2s ease-in-out infinite alternate}
#agent-bar{display:flex;gap:6px;flex-wrap:wrap}
.agent-btn{background:transparent;border:1px solid;border-radius:6px;padding:5px 10px;
  font-size:10px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;white-space:nowrap}
.agent-btn:hover{opacity:.8;transform:translateY(-1px)}
#add-btn{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.5);
  border-radius:6px;padding:5px 12px;color:var(--purple);font-size:10px;cursor:pointer;
  font-family:'Space Mono',monospace;font-weight:700;white-space:nowrap;transition:all .2s}
#add-btn:hover{opacity:.8}

/* TABS */
#tabs{border-bottom:1px solid var(--charcoal);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{background:none;border:none;padding:11px 14px;color:var(--light);font-size:10px;
  cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1.5px;
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--lavanda);border-bottom-color:var(--lavanda)}

/* FILTERS */
#filters{padding:8px 20px;border-bottom:1px solid rgba(85,85,85,.2);
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:rgba(55,55,55,.3)}
select{background:var(--charcoal);border:1px solid rgba(85,85,85,.4);border-radius:5px;
  padding:5px 10px;color:var(--crema);font-size:10px;font-family:'Space Mono',monospace}
#filter-info{font-size:10px;color:var(--light);font-family:'Space Mono',monospace}

/* CONTENT */
#content{padding:18px 20px;animation:fadeIn .3s ease}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--charcoal);border-radius:8px;border:1px solid rgba(85,85,85,.2);padding:16px}
.kpi-label{font-size:9px;color:var(--light);font-family:'Space Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:800;font-family:'Space Mono',monospace;margin-bottom:2px}
.kpi-sub{font-size:11px;color:var(--light)}
.kpi-sub.up{color:var(--success)}
.kpi-sub.down{color:var(--danger)}
canvas.minichart{display:block;margin-top:6px}

/* MACRO STRIP */
.macro-strip{background:var(--charcoal);border-radius:8px;border:1px solid rgba(85,85,85,.2);
  padding:10px 18px;display:flex;gap:28px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.macro-item{display:flex;gap:6px;align-items:center}
.macro-label{font-size:9px;color:var(--light);font-family:'Space Mono',monospace}
.macro-value{font-size:13px;font-weight:700;font-family:'Space Mono',monospace}

/* TABLE */
.data-table{background:var(--charcoal);border-radius:8px;border:1px solid rgba(85,85,85,.2);overflow:hidden}
.data-table table{width:100%;border-collapse:collapse}
.data-table th{padding:9px 10px;font-size:9px;color:var(--light);font-family:'Space Mono',monospace;
  text-align:left;letter-spacing:1px;background:rgba(26,26,26,.5);border-bottom:1px solid rgba(85,85,85,.2)}
.data-table td{padding:7px 10px;border-bottom:1px solid rgba(85,85,85,.1);font-size:12px}
.data-table tr:hover{background:rgba(55,55,55,.5);cursor:pointer}
.seg-badge{font-size:9px;font-weight:700;font-family:'Space Mono',monospace}
.pct-bar{display:flex;align-items:center;gap:5px}
.bar-track{width:36px;height:4px;background:var(--dark);border-radius:2px}
.bar-fill{height:100%;border-radius:2px}

/* MAP */
#map{height:calc(100vh - 240px);border-radius:10px;overflow:hidden;border:1px solid var(--charcoal)}
.map-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.map-ctrl-btn{background:var(--charcoal);border:1px solid rgba(85,85,85,.4);border-radius:5px;
  padding:4px 10px;color:var(--crema);font-size:9px;cursor:pointer;
  font-family:'Space Mono',monospace;letter-spacing:1px;transition:all .15s}
.map-ctrl-btn.active{background:var(--lavanda);color:var(--dark);border-color:var(--lavanda)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--dark);border-radius:12px;width:min(680px,96vw);
  max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--charcoal);
  display:flex;justify-content:space-between;align-items:flex-start}
.modal-tabs{display:flex;border-bottom:1px solid var(--charcoal);padding:0 16px}
.modal-tab{background:none;border:none;padding:10px 12px;color:var(--light);font-size:10px;
  cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:1px;
  border-bottom:2px solid transparent;transition:all .15s}
.modal-tab.active{color:var(--lavanda);border-bottom-color:var(--lavanda)}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.close-btn{background:none;border:none;color:var(--light);cursor:pointer;font-size:18px;line-height:1}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.detail-card{background:var(--charcoal);border-radius:7px;padding:10px 12px}
.detail-label{font-size:9px;color:var(--light);font-family:'Space Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.detail-value{font-size:16px;font-weight:800;font-family:'Space Mono',monospace}

/* AGENT CHAT */
.agent-modal{position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.agent-box{background:var(--dark);border-radius:12px;width:min(600px,95vw);
  height:min(680px,90vh);display:flex;flex-direction:column;overflow:hidden}
.agent-header{padding:16px 20px;border-bottom:1px solid var(--charcoal);
  display:flex;align-items:center;justify-content:space-between}
.agent-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start;background:var(--charcoal)}
.agent-input-row{padding:12px 16px;border-top:1px solid var(--charcoal);display:flex;gap:8px}
.agent-input{flex:1;background:var(--charcoal);border:1px solid rgba(85,85,85,.4);border-radius:6px;
  padding:10px 14px;color:var(--crema);font-size:13px;outline:none;font-family:'Space Mono',monospace}
.agent-send{border:none;border-radius:6px;padding:10px 16px;font-weight:700;cursor:pointer;
  font-size:13px;font-family:'Space Mono',monospace;transition:opacity .15s}
.agent-send:disabled{opacity:.5;cursor:not-allowed}
.typing-dot{width:6px;height:6px;border-radius:50%;
  animation:pulse 1s ease-in-out infinite alternate}
.suggestion-btn{background:transparent;border:1px solid;border-radius:6px;
  padding:8px 12px;font-size:12px;cursor:pointer;text-align:left;
  font-family:'Space Mono',monospace;transition:opacity .15s;display:block;width:100%;margin-bottom:6px}
.suggestion-btn:hover{opacity:.75}

/* ADD PROJECT MODAL */
.add-modal{position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.add-box{background:var(--dark);border:1px solid rgba(168,85,247,.3);border-radius:12px;
  width:min(560px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px;overflow-y:auto}
.field-label{font-size:9px;color:var(--light);font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.field-input{width:100%;background:var(--charcoal);border:1px solid rgba(85,85,85,.4);border-radius:5px;
  padding:8px 10px;color:var(--crema);font-size:12px;outline:none;font-family:'Space Mono',monospace}
.add-footer{padding:12px 20px;border-top:1px solid var(--charcoal);display:flex;justify-content:flex-end;gap:8px}
.btn-cancel{background:none;border:1px solid rgba(85,85,85,.4);border-radius:6px;padding:8px 16px;
  color:var(--light);cursor:pointer;font-family:'Space Mono',monospace;font-size:11px}
.btn-add{background:var(--purple);border:none;border-radius:6px;padding:8px 20px;
  color:white;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;font-weight:700}

/* LOADER */
#loader{position:fixed;inset:0;z-index:99999;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:32px;height:32px;border:3px solid rgba(149,171,232,.2);
  border-top-color:var(--lavanda);border-radius:50%;animation:spin 1s linear infinite}
#loader-text{font-family:'Space Mono',monospace;font-size:12px;color:var(--light)}

/* DEFICIT TAB */
.zone-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.zone-bar-label{width:100px;font-size:12px}
.zone-bar-track{flex:1;height:8px;background:var(--dark);border-radius:4px;overflow:hidden}
.zone-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.zone-bar-val{width:55px;font-size:12px;font-family:'Space Mono',monospace;text-align:right}

/* AFFORDABILITY */
.afford-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.afford-card{background:var(--charcoal);border-radius:7px;padding:12px 14px}
.afford-label{font-size:9px;color:var(--light);font-family:'Space Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.afford-value{font-size:18px;font-weight:800;font-family:'Space Mono',monospace}
.afford-sub{font-size:10px;color:var(--light);margin-top:2px}
.capacity-bar{height:10px;background:var(--dark);border-radius:5px;overflow:hidden;position:relative;margin-bottom:4px}
.capacity-fill{height:100%;border-radius:5px;transition:width .5s ease}
.capacity-line{position:absolute;top:0;width:2px;height:100%;background:var(--crema);opacity:.6}

.hidden{display:none!important}
</style>
</head>

// ─── UTILS ──────────────────────────────────────────────────
const fmt = (n,d=0) => n!=null ? n.toLocaleString('es-PE',{minimumFractionDigits:d,maximumFractionDigits:d}) : '—';
const fmtUSD = n => n!=null ? `$${fmt(n)}` : '—';
const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
const segColor = s => s==='A'?T.naranja:s==='B'?T.lavanda:T.success;

function miniChart(data, color, w=200, h=50) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h; c.className = 'minichart';
  const ctx = c.getContext('2d');
  const mn = Math.min(...data), mx = Math.max(...data), range = mx-mn||1;
  const pts = data.map((v,i)=>({x:i/(data.length-1)*w,y:h-((v-mn)/range)*(h-8)-4}));
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,color+'44'); g.addColorStop(1,color+'00');
  ctx.beginPath(); ctx.moveTo(pts[0].x,h);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,h); ctx.closePath();
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  const l=pts[pts.length-1];
  ctx.beginPath(); ctx.arc(l.x,l.y,3,0,Math.PI*2);
  ctx.fillStyle=color; ctx.fill();
  return c;
}

  d.style.borderColor = `${color||T.lavanda}22`;
  d.innerHTML = `
    <div class="kpi-label">${label}</div>
    <div class="kpi-value" style="color:${color||T.crema}">${value}</div>
    ${sub ? `<div class="kpi-sub ${trend>0?'up':trend<0?'down':''}">${trend>0?'▲':trend<0?'▼':'—'} ${sub}</div>` : ''}
  `;
  if (chartData) d.appendChild(miniChart(chartData, color||T.lavanda, 180, 36));
  return d;
}

// ─── DATA LOADING ───────────────────────────────────────────
async function loadData() {
  const saved = localStorage.getItem('hygge_own_projects');
  if (saved) { try { OWN_PROJECTS = JSON.parse(saved); } catch(e) {} }
  try {
    document.getElementById('loader-text').textContent = 'Conectando con Nexo Inmobiliario...';
    const r = await fetch('./projects.json');
    if (!r.ok) throw new Error('No data');
    const data = await r.json();
    ALL_PROJECTS = data.projects || [];
    SCRAPE_DATE = data.date || '';
    document.getElementById('loader-text').textContent = `${ALL_PROJECTS.length} proyectos cargados`;

    // Populate district filter
    const dists = [...new Set(ALL_PROJECTS.map(p=>p.district).filter(Boolean))].sort();
    const fDist = document.getElementById('f-dist');
    dists.forEach(d => { const o=document.createElement('option'); o.value=d; o.text=d; fDist.appendChild(o); });

    await new Promise(r=>setTimeout(r,400));
    document.getElementById('loader').classList.add('hidden');
    applyFilters();
    setupAgentBar();
  } catch(e) {
    document.getElementById('loader-text').textContent = 'Error cargando datos. Verifica que el scraper haya corrido.';
  }
}

function deleteOwnProject(id) {
  OWN_PROJECTS = OWN_PROJECTS.filter(p => p.id !== id);
  localStorage.setItem('hygge_own_projects', JSON.stringify(OWN_PROJECTS));
  applyFilters();
}

function applyFilters() {
  const dist = document.getElementById('f-dist').value;
  const seg  = document.getElementById('f-seg').value;
  const stage= document.getElementById('f-stage').value;
  const all  = [...ALL_PROJECTS, ...OWN_PROJECTS];
  FILTERED = all.filter(p => {
    if(dist && p.district !== dist) return false;
    if(seg  && p.segment !== seg) return false;
    if(stage && p.stage && !p.stage.toLowerCase().includes(stage.toLowerCase())) return false;
    return true;
  });
  const own = FILTERED.filter(p=>p.isOwn);
  document.getElementById('filter-info').textContent =
    `${FILTERED.length} proyectos${own.length?' ('+own.length+' propios)':''} · ${SCRAPE_DATE||'hoy'}`;
  renderTab();
}

// ─── TAB SWITCHING ──────────────────────────────────────────
function switchTab(tab) {
  CURRENT_TAB = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['dashboard','mapa','proyectos','poder','deficit'][i]===tab);
  });
  renderTab();
}

function renderTab() {
  const c = document.getElementById('content');
  c.innerHTML = '';
  c.style.animation = 'none';
  requestAnimationFrame(() => { c.style.animation = 'fadeIn .3s ease'; });
  if(CURRENT_TAB==='dashboard') renderDashboard(c);
  else if(CURRENT_TAB==='mapa')  renderMapa(c);
  else if(CURRENT_TAB==='proyectos') renderProyectos(c);
  else if(CURRENT_TAB==='poder') renderPoder(c);
  else if(CURRENT_TAB==='deficit') renderDeficit(c);
}

function initMap() {
  if(MAP_INSTANCE) {
    MAP_INSTANCE.remove();
    MAP_INSTANCE = null;
  }
  const map = L.map('map', {center:[-12.08,-77.04],zoom:12,zoomControl:false});
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {attribution:'©CartoDB',subdomains:'abcd',maxZoom:19}).addTo(map);
  MAP_INSTANCE = map;
  MAP_MARKERS = [];

  FILTERED.forEach(p => {
    if(!p.lat||!p.lng) return;
    const col = getMapColor(p);
    const sz = p.isOwn ? 38 : 28;
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;
        background:${col}22;border:2px solid ${col};display:flex;align-items:center;justify-content:center;
        font-size:${p.isOwn?11:9}px;font-weight:700;color:${col};font-family:'Space Mono',monospace;
        cursor:pointer;box-shadow:0 0 ${p.isOwn?20:10}px ${col}${p.isOwn?'88':'44'};
        ${p.isOwn?'animation:pulse 2s ease-in-out infinite alternate;':''}">
        ${p.isOwn?'H':p.segment}</div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],
    });
    const mk = L.marker([p.lat,p.lng],{icon}).addTo(map)
      .bindPopup(`<div style="background:${T.dark};color:${T.crema};padding:12px;border-radius:6px;
        min-width:230px;font-family:'Space Mono',monospace;font-size:11px;border:1px solid ${col}44">
        <div style="font-size:13px;font-weight:700;color:${col};margin-bottom:6px">${p.isOwn?'★ ':''}${p.name}</div>
        <div style="color:${T.light};margin-bottom:8px">${p.developer} · ${p.district}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <div><span style="color:${T.light}">Lista</span><br><strong>${fmtUSD(p.list_price_m2_usd)}/m²</strong></div>
          <div><span style="color:${T.light}">Cierre est.</span><br><strong style="color:${T.success}">${fmtUSD(p.close_price_m2_usd)}/m²</strong></div>
          <div><span style="color:${T.light}">Gap</span><br><strong style="color:${T.naranja}">-${p.discount_pct||0}%</strong></div>
          <div><span style="color:${T.light}">Área</span><br><strong>${p.min_area_m2||'?'}–${p.max_area_m2||'?'} m²</strong></div>
        </div></div>`,{maxWidth:280})
      .on('click',()=>openProject(p));
    MAP_MARKERS.push(mk);
  });
}

function getMapColor(p) {
  if(p.isOwn) return T.purple;
  const v = p.list_price_m2_usd||0;
  if(MAP_METRIC==='lista'||MAP_METRIC==='cierre') {
    return v>2800?T.naranja:v>2000?T.lavanda:v>1400?T.warning:T.success;
  }
  if(MAP_METRIC==='gap') {
    const g=p.discount_pct||0;
    return g>10?T.naranja:g>6?T.warning:T.success;
  }
  return p.segment==='A'?T.naranja:p.segment==='B'?T.lavanda:T.success;
}

function setMapMetric(m) {
  MAP_METRIC = m;
  renderTab();
}

  btn.closest('.modal').querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));

function updateAfford() {
  const p = window._afProject;
  const persona = window._afPersona;
  const sal = window._afSal;
  const bIdx = +document.getElementById('af-bank').value;
  const bank = BANKS[bIdx];
  const modality = window._afModality;
  const profile = persona.profiles[0];
  const salBase = sal[profile] || sal.mid || 5000;
  const salNet = modality==='pareja' ? Math.round(salBase * sal.pm) : salBase;
  const precio = p.close_ticket_usd||p.list_ticket_usd||0;
  const loanUSD = precio * persona.finPct;
  const r = bank.rate/100/12;
  const n = bank.plazo*12;
  const cuotaBase = loanUSD * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);
  const cuotaPEN = bank.currency==='USD' ? Math.round(cuotaBase*TC) : Math.round(cuotaBase);
  const cuotaDisplay = bank.currency==='USD' ? Math.round(cuotaBase) : Math.round(cuotaBase);
  const maxCuota = salNet * persona.cuotaMax;
  const ratio = cuotaPEN / maxCuota;
  const pct = Math.round(ratio*100);
  const ok = ratio <= 1;
  const enganche = Math.round(precio * (1-persona.finPct));
  const col = pct<70?T.success:pct<100?T.warning:T.danger;

  document.getElementById('af-results').innerHTML = `
    <div class="afford-grid">
      <div class="afford-card">
        <div class="afford-label">Ingreso neto ${modality==='pareja'?'pareja':'individual'}</div>
        <div class="afford-value" style="color:var(--crema)">S/${fmt(salNet)}</div>
        <div class="afford-sub">${modality==='pareja'?'doble ingreso':'individual'}</div>
      </div>
      <div class="afford-card">
        <div class="afford-label">Enganche (${Math.round((1-persona.finPct)*100)}%)</div>
        <div class="afford-value" style="color:var(--warning)">$${fmt(enganche)}</div>
        <div class="afford-sub">S/${fmt(Math.round(enganche*TC))}</div>
      </div>
      <div class="afford-card">
        <div class="afford-label">Cuota mensual</div>
        <div class="afford-value" style="color:var(--lavanda)">${bank.currency==='USD'?'$':'S/'}${fmt(cuotaDisplay)}</div>
        <div class="afford-sub">S/${fmt(cuotaPEN)} equiv.</div>
      </div>
      <div class="afford-card" style="border-color:${col}22">
        <div class="afford-label">% ingreso en cuota</div>
        <div class="afford-value" style="color:${col}">${pct}%</div>
        <div class="afford-sub">máx recomendado ${Math.round(persona.cuotaMax*100)}%</div>
      </div>
      <div class="afford-card">
        <div class="afford-label">Banco</div>
        <div class="afford-value" style="color:var(--crema);font-size:14px">${bank.bank}</div>
        <div class="afford-sub">${bank.rate}% ${bank.currency} ${bank.plazo} años</div>
      </div>
      <div class="afford-card" style="border-color:${ok?T.success:T.danger}22">
        <div class="afford-label">Veredicto</div>
        <div class="afford-value" style="color:${ok?T.success:T.danger}">${ok?'✓ VIABLE':'✗ DIFÍCIL'}</div>
        <div class="afford-sub">${ok?'dentro del rango bancario':'sobrepasa capacidad'}</div>
      </div>
    </div>
    <div style="background:var(--charcoal);border-radius:8px;padding:12px 14px;margin-top:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;font-family:'Space Mono',monospace">
        <span style="color:var(--light)">Capacidad de pago</span>
        <span style="color:${col}">${pct}% usado</span>
      </div>
      <div class="capacity-bar">
        <div class="capacity-fill" style="width:${Math.min(pct,100)}%;background:${col}"></div>
        <div class="capacity-line" style="left:${Math.round(persona.cuotaMax*100)}%"></div>
      </div>
      <div style="font-size:9px;color:var(--light);font-family:'Space Mono',monospace">línea blanca = límite ${Math.round(persona.cuotaMax*100)}% del ingreso</div>

        }

}

        onclick="sendAgentMsg(document.getElementById('agent-inp').value,'${agentId}','${context.replace(/'/g,"\\'")}',this.closest('.agent-modal'))">→</button>

async function sendAgentMsg(text, agentId, context, overlay) {
  if(!text.trim()) return;
  const a = AGENTS[agentId];
  const msgs = overlay.querySelector('.agent-messages');
  const inp = overlay.querySelector('.agent-input');
  const btn = overlay.querySelector('.agent-send');

  // Clear suggestions
  overlay.querySelectorAll('.suggestion-btn').forEach(b=>b.remove());
  inp.value = '';
  btn.disabled = true;

  // User message
  const userDiv = document.createElement('div');
  userDiv.className = 'msg user';
  userDiv.style.cssText = `background:${a.color}22;border:1px solid ${a.color}44;color:var(--crema)`;
  userDiv.textContent = text;
  msgs.appendChild(userDiv);

  // Typing indicator
  const typing = document.createElement('div');
  typing.style.cssText = 'display:flex;gap:4px;padding:10px 14px;align-self:flex-start';
  typing.innerHTML = [0,1,2].map(i=>`<div class="typing-dot" style="background:${a.color};animation-delay:${i*0.2}s"></div>`).join('');
  msgs.appendChild(typing);
  msgs.scrollTop = 9999;

  AGENT_HISTORY.push({role:'user',content:text});
  const sysWithCtx = context ? `${a.sys}\n\nContexto del proyecto: ${context}` : a.sys;

  try {
    const payload = JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:1000,
      system:sysWithCtx,
      messages:AGENT_HISTORY.map(m=>({role:m.role,content:m.content})),
    });
    const res = await fetch('/.netlify/functions/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:payload,
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Error al procesar.';
    AGENT_HISTORY.push({role:'assistant',content:reply});
    typing.remove();
    const aDiv = document.createElement('div');
    aDiv.className = 'msg assistant';
    aDiv.style.cssText = `border:1px solid rgba(85,85,85,.3);color:var(--crema)`;
    aDiv.innerHTML = reply
      .replace(/^### (.*)/gm, '<div style="font-size:13px;font-weight:700;color:var(--lavanda);margin:10px 0 4px">$1</div>')
      .replace(/^## (.*)/gm, '<div style="font-size:14px;font-weight:700;color:var(--naranja);margin:12px 0 6px;font-family:Space Mono,monospace">$1</div>')
      .replace(/^# (.*)/gm, '<div style="font-size:16px;font-weight:700;color:var(--crema);margin:14px 0 6px;font-family:Space Mono,monospace">$1</div>')
      .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--crema)">$1</strong>')
      .replace(/^- (.*)/gm, '<div style="padding-left:12px;margin:2px 0">· $1</div>')
      .replace(/\n/g, '<br>');
    msgs.appendChild(aDiv);
  } catch {
    typing.remove();
    const eDiv = document.createElement('div');
    eDiv.className = 'msg assistant';
    eDiv.style.color = T.danger;
    eDiv.textContent = 'Error de conexión.';
    msgs.appendChild(eDiv);
  }
  btn.disabled = false;
  msgs.scrollTop = 9999;
  inp.focus();
}

function suggestProjectValues() {
  const dist = document.getElementById('ap-dist').value;
  const seg  = document.getElementById('ap-seg').value;
  
  // Get market averages for this district + segment
  const comps = ALL_PROJECTS.filter(p => p.district === dist && p.segment === seg);
  if (!comps.length) return;
  
  const avgList  = Math.round(comps.reduce((s,p)=>s+(p.list_price_m2_usd||0),0)/comps.length);
  const avgClose = Math.round(comps.reduce((s,p)=>s+(p.close_price_m2_usd||0),0)/comps.length);
  const avgAmin  = Math.round(comps.reduce((s,p)=>s+(p.min_area_m2||0),0)/comps.length);
  const avgAmax  = Math.round(comps.reduce((s,p)=>s+(p.max_area_m2||0),0)/comps.length);

  // Only suggest if field is empty
  const listField  = document.getElementById('ap-list');
  const closeField = document.getElementById('ap-close');
  const aminField  = document.getElementById('ap-amin');
  const amaxField  = document.getElementById('ap-amax');
  
  listField.value  = avgList;  listField.style.borderColor = '#95ABE8';
  closeField.value = avgClose; closeField.style.borderColor = '#4CAF88';
  aminField.value  = avgAmin;  aminField.style.borderColor = '#95ABE844';
  amaxField.value  = avgAmax;  amaxField.style.borderColor = '#95ABE844';

  // Show market context
  const ctx = document.getElementById('ap-market-ctx');
  if (ctx) {
    ctx.innerHTML = `
      <div style="font-size:9px;color:#888;font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:4px">
        MERCADO ${dist.toUpperCase()} SEG ${seg} — ${comps.length} proyectos activos
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        <span style="font-size:10px;color:#95ABE8">Lista: <strong>$${avgList.toLocaleString()}/m²</strong></span>
        <span style="font-size:10px;color:#4CAF88">Cierre: <strong>$${avgClose.toLocaleString()}/m²</strong></span>
        <span style="font-size:10px;color:#888">Área: <strong>${avgAmin}–${avgAmax}m²</strong></span>
      </div>`;
    ctx.style.display = 'block';
  }
}

function addProject(overlay) {
  try {
  const g = id => document.getElementById(id).value;
  const dist = g('ap-dist');
  const listM2 = +g('ap-list');
  const closeM2 = +g('ap-close') || Math.round(listM2*0.94);
  const amin = +g('ap-amin') || 120;
  const amax = +g('ap-amax') || amin;
  if(!g('ap-name')||!listM2) return;

  const DIST_COORDS = {
    'San Isidro':[-12.0931,-77.0465],'Miraflores':[-12.1181,-77.0336],
    'Barranco':[-12.1478,-77.0228],'Surco':[-12.15,-76.99],
    'San Borja':[-12.1056,-77.0031],'La Molina':[-12.0856,-76.9424],
    'Jesús María':[-12.0731,-77.0531],'Magdalena':[-12.0894,-77.0681],
    'Lince':[-12.0831,-77.0361],'Pueblo Libre':[-12.0731,-77.0731],
    'San Miguel':[-12.0769,-77.0928],
  };
  const [lat,lng] = g('ap-lat')&&g('ap-lng') ? [+g('ap-lat'),+g('ap-lng')] : (DIST_COORDS[dist]||[-12.08,-77.03]);

  const proj = {
    id:`own_${Date.now()}`,nexo_id:null,source:'own',isOwn:true,
    name:g('ap-name'),developer:g('ap-dev')||'Hygge Inmobiliaria',
    district:dist,zone:'Lima Moderna',segment:g('ap-seg'),
    stage:g('ap-stage'),delivery:g('ap-delivery'),
    min_area_m2:amin,max_area_m2:amax,
    list_price_m2_usd:listM2,close_price_m2_usd:closeM2,
    discount_pct:Math.round((listM2-closeM2)/listM2*100),
    list_ticket_usd:Math.round(listM2*amin),
    close_ticket_usd:Math.round(closeM2*amin),
    list_price_usd:Math.round(listM2*amin),
    price_history:[],lat,lng,
    scraped_at:new Date().toISOString(),scraped_date:new Date().toISOString().split('T')[0],
  };

  OWN_PROJECTS.push(proj);
  localStorage.setItem('hygge_own_projects', JSON.stringify(OWN_PROJECTS));
  overlay.remove();
  applyFilters();
  } catch(e) { alert('Error: ' + e.message); }
}
