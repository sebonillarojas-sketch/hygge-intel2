name: HYGGE INTEL — Daily Scraper

on:
  schedule:
    # 6:00 AM Lima time (UTC-5) = 11:00 AM UTC
    - cron: '0 11 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: |
          python scraper/scrape.py
        timeout-minutes: 20

      - name: Show results summary
        run: |
          python3 -c "
          import json
          d = json.load(open('data/projects.json'))
          print(f'Total: {d[\"total\"]} projects')
          from collections import defaultdict
          zones = defaultdict(list)
          for p in d['projects']:
              zones[p.get('zone','?')].append(p)
          for z, ps in sorted(zones.items()):
              prices = [p['list_price_m2_usd'] for p in ps if p.get('list_price_m2_usd')]
              if prices:
                  print(f'  {z}: {len(ps)} proyectos | avg \${sum(prices)//len(prices):,}/m2')
          "

      - name: Commit scraped data
        run: |
          git config user.name "HYGGE Intel Bot"
          git config user.email "bot@hygge.pe"
          git add data/projects.json data/snapshots/
          git diff --staged --quiet || git commit -m "data: scrape $(date '+%Y-%m-%d') — $(python3 -c \"import json; d=json.load(open('data/projects.json')); print(d['total'])\" ) projects"
          git push

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.run_number }} — data updated"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
